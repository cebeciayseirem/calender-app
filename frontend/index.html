<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav id="navbar">
        <div class="nav-left">
            <button id="btn-today">Today</button>
            <button id="btn-prev">&larr;</button>
            <button id="btn-next">&rarr;</button>
            <span id="nav-title"></span>
        </div>
        <div class="nav-center">
            <button class="view-btn" data-view="yearly">Year</button>
            <button class="view-btn" data-view="monthly">Month</button>
            <button class="view-btn" data-view="weekly">Week</button>
            <button class="view-btn" data-view="daily">Day</button>
        </div>
        <div class="nav-right">
            <input type="text" id="search-input" placeholder="Search...">
        </div>
    </nav>
    <main id="calendar"></main>

    <div id="event-modal" class="modal hidden">
        <div class="modal-content event-modal-content">
            <form id="event-form" autocomplete="off">
                <input type="hidden" id="form-id">
                <input type="hidden" id="form-recurrence-parent">

                <div class="form-group title-row">
                    <div class="title-spacer"></div>
                    <label for="form-title">Title</label>
                    <input type="text" id="form-title" required autocomplete="off" placeholder="Event title">
                </div>

                <input type="hidden" id="form-category" value="">
                <div class="tag-row" id="tag-row">
                    <button type="button" class="tag-btn" data-tag="Work" data-color="#FFA726">Work</button>
                    <button type="button" class="tag-btn" data-tag="Health" data-color="#42a5f5">Health</button>
                    <button type="button" class="tag-btn" data-tag="Errand" data-color="#4caf50">Errand</button>
                    <button type="button" class="tag-btn" data-tag="Social" data-color="#ab47bc">Social</button>
                </div>

                <input type="hidden" id="form-start" value="">
                <input type="hidden" id="form-end" value="">
                <div class="dt-row">
                    <svg class="dt-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <div class="dt-field" id="date-trigger">Select date</div>
                    <span class="dt-sep-dot"></span>
                    <div class="dt-field dt-time-field" id="start-time-trigger">Start</div>
                    <span class="dt-dash">–</span>
                    <div class="dt-field dt-time-field" id="end-time-trigger">End</div>
                </div>

                <div class="icon-field-row">
                    <svg class="icon-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="15" y2="18"/></svg>
                    <input type="text" id="form-description" autocomplete="off" placeholder="Add description">
                </div>

                <div class="icon-field-row">
                    <svg class="icon-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    <input type="text" id="form-location" autocomplete="off" placeholder="Add location">
                </div>

                <input type="hidden" id="form-color" value="#74d5ff">

                <div class="icon-field-row rec-trigger-row" id="rec-trigger-row">
                    <svg class="icon-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                    <span class="rec-trigger-label" id="rec-trigger">Does not repeat</span>
                </div>

                <div class="form-actions">
                    <button type="button" id="btn-delete" class="btn-delete hidden">Delete</button>
                    <button type="button" id="btn-cancel" class="btn-cancel">Cancel</button>
                    <button type="submit" id="btn-save">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="rec-preset-modal" class="modal hidden">
        <div class="modal-content modal-small modal-styled rec-modal-inner">
            <div class="rec-preset-list">
                <div class="rec-preset-item" data-value="">Does not repeat</div>
                <div class="rec-preset-item" data-value="daily">Every day</div>
                <div class="rec-preset-item" data-value="weekly">Every week</div>
                <div class="rec-preset-item" data-value="monthly">Every month</div>
                <div class="rec-preset-item" data-value="yearly">Every year</div>
                <div class="rec-preset-item rec-preset-custom">Custom...</div>
            </div>
        </div>
    </div>

    <div id="recurrence-modal" class="modal hidden">
        <div class="modal-content modal-small modal-styled rec-modal-inner">
            <div class="rec-section">
                <label class="rec-section-label">Repeats every</label>
                <div class="rec-repeats-row">
                    <input type="number" id="form-rec-interval" min="1" value="1" class="rec-interval-input">
                    <select id="form-rec-type" class="rec-unit-select">
                        <option value="daily">day</option>
                        <option value="weekly">week</option>
                        <option value="monthly">month</option>
                        <option value="yearly">year</option>
                    </select>
                </div>
            </div>

            <div id="rec-monthly-mode-section" class="rec-section hidden">
                <div class="custom-select" id="monthly-mode-dropdown">
                    <div class="custom-select-trigger" id="monthly-mode-trigger">Monthly on day 1</div>
                    <div class="custom-select-options hidden" id="monthly-mode-options"></div>
                </div>
                <input type="hidden" id="form-rec-monthly-mode" value="dayOfMonth">
            </div>

            <div id="rec-repeats-on-section" class="rec-section hidden">
                <label class="rec-section-label">Repeats on</label>
                <div id="days-of-week" class="rec-days-row">
                    <label class="rec-day-circle"><input type="checkbox" value="1"><span>M</span></label>
                    <label class="rec-day-circle"><input type="checkbox" value="2"><span>T</span></label>
                    <label class="rec-day-circle"><input type="checkbox" value="3"><span>W</span></label>
                    <label class="rec-day-circle"><input type="checkbox" value="4"><span>T</span></label>
                    <label class="rec-day-circle"><input type="checkbox" value="5"><span>F</span></label>
                    <label class="rec-day-circle"><input type="checkbox" value="6"><span>S</span></label>
                    <label class="rec-day-circle"><input type="checkbox" value="0"><span>S</span></label>
                </div>
            </div>

            <div class="rec-section">
                <label class="rec-section-label">Ends</label>
                <label class="rec-radio-option">
                    <input type="radio" name="rec-end-type" value="never" checked>
                    <span class="rec-radio-circle"></span>
                    <span>Never</span>
                </label>
                <label class="rec-radio-option rec-end-inline">
                    <input type="radio" name="rec-end-type" value="on">
                    <span class="rec-radio-circle"></span>
                    <span>On</span>
                    <input type="date" id="form-rec-end" class="rec-inline-input">
                </label>
                <label class="rec-radio-option rec-end-inline">
                    <input type="radio" name="rec-end-type" value="after">
                    <span class="rec-radio-circle"></span>
                    <span>After</span>
                    <input type="number" id="form-rec-count" min="1" value="1" class="rec-inline-input rec-count-input">
                    <span>occurrence</span>
                </label>
            </div>
            <div class="form-actions">
                <button type="button" id="rec-back-btn" class="btn-cancel">Cancel</button>
                <button type="button" id="rec-modal-save" class="btn-primary">Save</button>
            </div>
        </div>
    </div>

    <script type="module" src="/js/app.js"></script>
</body>
</html>
